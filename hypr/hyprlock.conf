authentication {
    pam:enabled = true
    fingerprint:enabled = true
}
general {
    grace = 15
    hide_cursor = true
    ignore_empty_input = false
}

background {
    monitor =
    path = /home/mike/Pictures/Wallpapers/Island.jpg

    # blur_passes = 2
    # blur_size = 7
    # noise = 0.0117
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%a %b %-d')"
    color = rgba(200, 200, 200, 0.9)
    font_size = 30
    font_family = Inter

    position = 0, -23%
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(200, 200, 200, 0.8)
    font_size = 125
    font_family = Inter

    position = 0, -25%
    halign = center
    valign = top
}


label {
    monitor =
    text = $USER
    color = rgba(200, 200, 200, 1.0)
    font_size = 25
    font_family = Inter

    shadow_passes = 3
    shadow_size = 1

    position = 0, -80%
    halign = center
    valign = top
}


input-field {
  monitor = 
  size = 150, 25
  outline_thickness = 0
  dots_size = 0.5
  dots_spacing = 0.150000
  dots_center = true
  dots_rounding = -1
  outer_color = rgb(25, 23, 36)
  inner_color = rgb(31, 29, 46)
  font_color = rgb(224, 222, 244)
  fade_on_empty = true
  fade_timeout = 2000
  placeholder_text = Enter Password
  hide_input = false
  rounding = -1
  shadow_passes = 0
  shadow_size = 3
  shadow_color = rgba(0, 0, 0, 1.0)
  shadow_boost = 1.200000
  check_color = rgb(246, 193, 119)
  fail_color = rgb(235, 111, 146)
  fail_text = <i>$FAIL</i>
  fail_transition = 300
  capslock_color = -1
  numlock_color = -1
  bothlock_color = -1
  invert_numlock = false
  swap_font_color = false


  position = 0, -85%
  halign = center
  valign = top
}
