# Core Backgrounds (Dark Blue-Grey)
# Matches your popup background #1e1e2e
background = 0xFF1E1E2E
# Slightly lighter for widgets/cards
base = 0xFF282828

# Text Colors
# Pure white for primary text
text = 0xFFFFFFFF
# Slightly dimmed white for bright text/headers
bright_text = 0xFFF0F0F0

# UI Elements
# Matches your Toggle "Off" state (#3a3a3c)
alternate_base = 0xFF3A3A3C

# Accents
# Primary: macOS Blue (#007AFF)
accent = 0xFF007AFF
# Secondary: macOS Green (#34C759) - Good for success states/battery
accent_secondary = 0xFF34C759

# Sizing & Fonts
h1_size = 19
h2_size = 15
h3_size = 13
font_size = 11
small_font_size = 10

# Theme Settings
icon_theme = WhiteSur-dark
font_family = Inter
font_family_monospace = monospace

# Styling
# macOS uses slightly softer rounding
rounding_large = 12
rounding_small = 6
