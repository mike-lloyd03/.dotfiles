env = XCURSOR_THEME,WinSur-dark-cursors
env = XCURSOR_SIZE,24
# env = HYPRCURSOR_THEME,WinSur-Hyprcursor
# env = HYPRCURSOR_SIZE,24

# Theme
env = QT_QPA_PLATFORMTHEME,qt6ct
# env = QT_QPA_PLATFORMTHEME,hyprqt6engine

# GPU setup
# ---------------------
# lspci | grep -E "VGA|3D" to list devices
# ls /dev/dri/by-path to get device paths
# sudo lsof /dev/dri/card1 to list running processes on each card

# dGPU: 03:00.0
# iGPU: c5:00.0

env = AQ_DRM_DEVICES,/dev/dri/igpu:/dev/dri/dgpu
env = WLR_DRM_DEVICES,/dev/dri/igpu:/dev/dri/dgpu
